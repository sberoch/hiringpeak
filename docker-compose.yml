name: hiringpeak-app
services:
  postgres:
    restart: unless-stopped
    container_name: hiringpeak-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: hiringpeak
    volumes:
      - ./data:/var/lib/postgresql/data
